<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotr</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      .filled-icon { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      .feed-scroll::-webkit-scrollbar { width: 6px; }
      .feed-scroll::-webkit-scrollbar-track { background: transparent; }
      .feed-scroll::-webkit-scrollbar-thumb { background-color: #e2e2e2; border-radius: 9999px; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* ── Auth screen animations ── */
      @keyframes blob {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33%      { transform: translate(36px, -48px) scale(1.12); }
        66%      { transform: translate(-24px, 24px) scale(0.94); }
      }
      @keyframes floaty {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-14px); }
      }
      @keyframes auth-in {
        from { opacity: 0; transform: translateY(18px) scale(0.985); }
        to   { opacity: 1; transform: translateY(0)    scale(1); }
      }
      @keyframes auth-shake {
        10%, 90%        { transform: translateX(-2px); }
        20%, 80%        { transform: translateX(4px); }
        30%, 50%, 70%   { transform: translateX(-7px); }
        40%, 60%        { transform: translateX(7px); }
      }
      @keyframes slide-down {
        from { opacity: 0; transform: translateY(-8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fade-swap {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes pop-check {
        0%   { transform: scale(0); opacity: 0; }
        60%  { transform: scale(1.18); opacity: 1; }
        100% { transform: scale(1); }
      }
      @keyframes drift {
        0%, 100% { transform: translate(0, 0) rotate(0deg); }
        50%      { transform: translate(14px, -22px) rotate(8deg); }
      }
      @keyframes twinkle {
        0%, 100% { opacity: 0.15; transform: scale(0.85); }
        50%      { opacity: 0.6;  transform: scale(1.15); }
      }
      @keyframes spin-slow { to { transform: rotate(360deg); } }
      .animate-blob       { animation: blob 16s ease-in-out infinite; }
      .animate-floaty     { animation: floaty 6s ease-in-out infinite; }
      .auth-in            { animation: auth-in 0.65s cubic-bezier(0.22, 1, 0.36, 1) both; }
      .animate-shake      { animation: auth-shake 0.5s ease both; }
      .animate-slide-down { animation: slide-down 0.3s ease both; }
      .animate-fade-swap  { animation: fade-swap 0.35s ease both; }
      .animate-pop-check  { animation: pop-check 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
      .animate-drift      { animation: drift 9s ease-in-out infinite; }
      .animate-twinkle    { animation: twinkle 3.5s ease-in-out infinite; }
      .animate-spin-slow  { animation: spin-slow 26s linear infinite; }

      /* Leaflet popup reset */
      .spotr-popup .leaflet-popup-content-wrapper {
        padding: 0;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        border: none;
        animation: popup-open 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes popup-open {
        from { opacity: 0; transform: translateY(10px) scale(0.93); }
        to   { opacity: 1; transform: translateY(0)   scale(1); }
      }
      .spotr-popup.closing .leaflet-popup-content-wrapper {
        animation: popup-close 0.2s ease forwards;
      }
      @keyframes popup-close {
        from { opacity: 1; transform: translateY(0)   scale(1); }
        to   { opacity: 0; transform: translateY(10px) scale(0.93); }
      }
      .spotr-popup .leaflet-popup-content {
        margin: 0;
        width: 256px !important;
      }
      .spotr-popup .leaflet-popup-tip-container {
        display: none;
      }
      .spotr-popup .leaflet-popup-close-button {
        display: none;
      }
      /* Pin coloreado: quitar la caja blanca por defecto del divIcon */
      .spotr-pin {
        background: transparent;
        border: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
