# Configuración Nginx para la SPA de Spotr.
# El fallback a index.html permite que React Router maneje rutas como
# /login o / sin que Nginx devuelva 404 al recargar la página.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache largo para los assets con hash en el nombre
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
